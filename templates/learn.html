<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Sign Language</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .sign-card {
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }
        .sign-card:hover {
            transform: scale(1.05);
        }
        .sign-letter {
            font-size: 3rem;
            font-weight: bold;
            color: #0d6efd;
        }
        .search-container {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <header class="bg-primary text-white text-center py-4">
            <h1>SIGN LANGUAGE RECOGNITION</h1>
        </header>
        
        <!-- Navigation Bar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/"><i class="fas fa-home-alt"></i> Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/detection"><i class="fas fa-camera"></i> Detection</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/learn"><i class="fas fa-hands"></i> Learn Signs</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/test"><i class="fas fa-clipboard-check"></i> Test Yourself</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container mt-4">
            <h2 class="text-center mb-4">Learn Sign Language Alphabets</h2>
            
            <!-- Search and Filter -->
            <div class="search-container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" id="search-input" class="form-control" placeholder="Search for a letter...">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Sign Language Cards -->
            <div class="row" id="sign-container">
                {% for sign in sign_images %}
                <div class="col-6 col-sm-4 col-md-3 col-lg-2 sign-card-container" data-letter="{{ sign.letter }}">
                    <div class="card sign-card shadow text-center">
                        <div class="card-body">
                            <img src="/signs/{{ sign.letter }}.png" alt="Sign for {{ sign.letter }}" class="img-fluid mb-3">
                            <div class="sign-letter">{{ sign.letter }}</div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>

        <footer class="bg-primary text-white text-center py-3 mt-5">
            <p>© 2023 Sign Language Recognition</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Search functionality
        document.getElementById('search-input').addEventListener('input', function() {
            const searchTerm = this.value.toUpperCase();
            const signCards = document.querySelectorAll('.sign-card-container');
            
            signCards.forEach(card => {
                const letter = card.getAttribute('data-letter').toUpperCase();
                if (letter.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
